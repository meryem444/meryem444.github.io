<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NO SCHOOL — Curriculum System</title>
<style>
:root{--bg:#FAF8F3;--surface:#fff;--primary:#1B2A4A;--text:#2C3E50;--muted:#7F8C8D;--border:#E5E1D8;--radius:10px;--shadow:0 2px 8px rgba(0,0,0,.07);
--creative:#9B59B6;--creativeBg:#EDE0F5;--language:#2980B9;--languageBg:#D0E8F8;--discovery:#27AE60;--discoveryBg:#C8EDD8;--domestic:#C8960C;--domesticBg:#F5E8C8;--nurturing:#1ABC9C;--nurturingBg:#C8EDE8;--social:#E74C3C;--socialBg:#F8D8D8;
--mon:#5b21b6;--monBg:#ceb6fe;--tue:#7c2d12;--tueBg:#f8ae9d;--wed:#713f12;--wedBg:#f8e58c;--thu:#7c3a00;--thuBg:#fcc493;--fri:#14532d;--friBg:#94c8ab;--sat:#1e3a5f;--satBg:#94b3dc;--sun:#4b5563;--sunBg:#ffffff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
header{background:var(--primary);color:#fff;padding:0 20px;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100}
header h1{font-family:Georgia,serif;font-size:18px;font-weight:400;white-space:nowrap;margin-right:auto}
header h1 em{font-style:normal;opacity:.6;font-size:14px}
nav{display:flex;gap:2px}
nav button{background:none;border:none;color:rgba(255,255,255,.65);font-size:13px;padding:8px 14px;cursor:pointer;border-radius:6px 6px 0 0;transition:.2s}
nav button:hover{color:#fff;background:rgba(255,255,255,.1)}
nav button.active{color:#fff;background:rgba(255,255,255,.15);font-weight:600}
main{max-width:1400px;margin:0 auto;padding:20px}
.view{display:none}.view.active{display:block}
.cards{display:grid;gap:16px}
.cards-2{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
.cards-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{font-size:15px;margin-bottom:6px}
.card p{font-size:13px;color:var(--muted)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;margin:2px}
.badge-creative{background:var(--creativeBg);color:var(--creative)}
.badge-language{background:var(--languageBg);color:var(--language)}
.badge-discovery{background:var(--discoveryBg);color:var(--discovery)}
.badge-domestic{background:var(--domesticBg);color:var(--domestic)}
.badge-nurturing{background:var(--nurturingBg);color:var(--nurturing)}
.badge-social{background:var(--socialBg);color:var(--social)}
.badge-season{background:#F0F0F0;color:#555}
.badge-lang{background:#E8F5E9;color:#2E7D32}
.badge-festival{background:#FFF3E0;color:#E65100}
.section-title{font-family:Georgia,serif;font-size:22px;color:var(--primary);margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.section-title:first-child{margin-top:0}
.virtue-banner{padding:12px 18px;border-radius:var(--radius);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.virtue-banner .emoji{font-size:28px}
.virtue-banner .info h2{font-size:18px;margin:0}.virtue-banner .info p{font-size:13px;opacity:.8;margin:0}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.dash-card{padding:20px;border-radius:var(--radius);text-align:center}
.dash-card .big{font-size:32px;font-weight:700;margin-bottom:4px}
.dash-card .label{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.7}
.dash-card .sub{font-size:14px;margin-top:6px}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center}
.filters input[type=text]{padding:8px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;width:220px;background:var(--surface)}
.filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:16px;background:var(--surface);font-size:12px;cursor:pointer;transition:.2s}
.filter-btn:hover{border-color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.act-card{cursor:pointer;transition:.2s;position:relative}
.act-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.act-card .name{font-weight:600;font-size:14px;margin-bottom:6px}
.act-card .meta{font-size:12px;color:var(--muted);margin-top:8px}
.act-card .desc{font-size:12px;color:var(--text);margin-top:6px;line-height:1.4}
.planner-grid{display:grid;grid-template-columns:90px 160px repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;font-size:12px}
.planner-grid>div{background:var(--surface);padding:6px 8px;min-height:42px;display:flex;align-items:flex-start}
.planner-hdr{background:var(--primary)!important;color:inherit;font-weight:600;justify-content:center;text-align:center;flex-direction:column;padding:8px 4px!important;min-height:52px!important}
.planner-time{background:#EDF2F7!important;font-weight:600;color:var(--primary);font-size:11px;justify-content:center}
.planner-label{background:#EDF2F7!important;font-size:11px;color:#555;flex-direction:column}
.planner-cell{cursor:pointer;font-size:11px;transition:.15s;position:relative}
.planner-cell:hover{filter:brightness(.95)}
.planner-cell.has-activity{font-weight:500}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.week-nav button{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:13px}
.week-nav button:hover{background:var(--primary);color:#fff}
.week-nav .week-label{font-family:Georgia,serif;font-size:18px;color:var(--primary)}
.festival-card{border-left:4px solid}
.festival-card .fest-name{font-size:16px;font-weight:700;margin-bottom:4px}
.festival-card .fest-theme{font-size:13px;font-style:italic;color:var(--muted);margin-bottom:8px}
.festival-card .fest-acts{font-size:12px;line-height:1.6}
.season-section{margin-bottom:28px}
.season-hdr{font-family:Georgia,serif;font-size:18px;padding:8px 16px;border-radius:var(--radius);margin-bottom:12px;font-weight:600}
.log-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.log-form label{font-size:12px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;gap:4px}
.log-form input,.log-form select{padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.log-form button{grid-column:1/-1;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.log-form button:hover{opacity:.9}
.log-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.log-table th{background:var(--primary);color:#fff;padding:10px 8px;text-align:left;font-weight:600}
.log-table td{padding:8px;border-bottom:1px solid var(--border)}
.log-table tr:nth-child(even){background:#FAFAFA}
.tx-summary{margin-top:24px}
.tx-row{display:grid;grid-template-columns:240px 180px 1fr;gap:8px;padding:8px 12px;border-radius:6px;margin-bottom:4px;font-size:13px;align-items:center}
.tx-row.hdr{background:var(--primary);color:#fff;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;position:relative}
.modal .close{position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;color:var(--muted);background:none;border:none}
.modal h2{font-family:Georgia,serif;font-size:20px;margin-bottom:4px}
.modal .modal-badges{margin:8px 0 12px}
.modal .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.modal .detail-item{font-size:13px}.modal .detail-item strong{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}
.modal .materials{background:#F9F9F5;padding:12px;border-radius:8px;margin:12px 0;font-size:13px}
.modal .materials h4{font-size:12px;color:var(--muted);margin-bottom:4px}
.modal .log-btn{display:inline-block;padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:12px;font-size:13px}
.pick-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:60px 20px}
.pick-overlay.open{display:flex}
.pick-modal{background:var(--surface);border-radius:var(--radius);max-width:500px;width:100%;max-height:70vh;overflow-y:auto;padding:20px}
.pick-modal input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px}
.pick-item{padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.pick-item:hover{background:var(--bg)}
.pick-item .pick-art{font-size:11px;opacity:.7}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px}
@media(max-width:768px){.dash-grid{grid-template-columns:1fr}.planner-grid{font-size:10px}nav button{font-size:11px;padding:6px 8px}.cards-3{grid-template-columns:1fr}}
/* Art tabs */
.cat-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);overflow-x:auto;margin-bottom:0;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:9px 16px;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;font-size:13px;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.2s;font-family:inherit}
.cat-tab:hover{color:var(--primary);background:rgba(0,0,0,.03)}
.cat-tab.active{color:var(--primary);font-weight:600;border-bottom-color:var(--primary)}
/* Catalog table */
.cat-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.cat-table th{background:var(--primary);color:#fff;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap;cursor:pointer;user-select:none}
.cat-table th:hover{background:#253d6e}
.cat-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.cat-table tr:nth-child(even) td{background:#FAFAF8}
.cat-table tr:hover td{background:#F0F0EB}
.act-name-link{font-weight:600;cursor:pointer;color:var(--primary);text-decoration:none}
.act-name-link:hover{text-decoration:underline}
/* View toggle */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-toggle button{padding:6px 14px;border:none;background:var(--surface);font-size:13px;cursor:pointer;transition:.15s;font-family:inherit}
.view-toggle button.active{background:var(--primary);color:#fff}
/* Add/Edit activity form */
.act-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.act-form label{font-size:12px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;gap:4px}
.act-form input,.act-form select,.act-form textarea{padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--surface)}
.act-form textarea{resize:vertical;min-height:64px}
.act-form .full{grid-column:1/-1}
.act-form .form-btns{grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end;margin-top:4px;padding-top:12px;border-top:1px solid var(--border)}
/* Custom badge + row action buttons */
.badge-custom{background:#EDE9FF;color:#5B21B6}
.act-edit-btn{padding:4px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-size:11px;cursor:pointer;transition:.15s}
.act-edit-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.act-del-btn{padding:4px 9px;border:1px solid #FCA5A5;border-radius:4px;background:#FEF2F2;color:#DC2626;font-size:11px;cursor:pointer;transition:.15s}
.act-del-btn:hover{background:#DC2626;color:#fff}
</style>
</head>
<body>
<header>
<h1>🌿 NO SCHOOL <em>Curriculum System</em></h1>
<nav>
<button class="active" onclick="switchView('dashboard')">🏠 Dashboard</button>
<button onclick="switchView('planner')">🗓️ Planner</button>
<button onclick="switchView('catalog')">📚 Catalog</button>
<button onclick="switchView('festivals')">🎉 Celebrations</button>
<button onclick="switchView('log')">📊 Log</button>
<button onclick="switchView('guide')">📖 Guide</button>
</nav>
</header>
<main>
<section id="view-dashboard" class="view active"></section>

<section id="view-log" class="view"></section>
</main>
<section id="view-guide" class="view"></section>
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>
<div id="pick-overlay" class="pick-overlay" onclick="if(event.target===this)closePick()"><div class="pick-modal" id="pick-content"></div></div>

/* === HELPERS === */
function save(k,v){try{localStorage.setItem('ns_'+k,JSON.stringify(v))}catch(e){}}
function load(k,d){try{const v=localStorage.getItem('ns_'+k);return v?JSON.parse(v):d}catch(e){return d}}
function $(id){return document.getElementById(id)}
function qs(sel,el){return (el||document).querySelector(sel)}
function qsa(sel,el){return (el||document).querySelectorAll(sel)}
function h(tag,cls,html){return `<${tag} class="${cls||''}">${html||''}</${tag}>`}

function getCurrentSeason(){const m=new Date().getMonth()+1;return SEASONS.find(s=>s.months.includes(m))}
function getNextCelebration(){const now=new Date(),y=now.getFullYear();
  const all=FESTIVALS.map(f=>{const day=f.day||15;let d=new Date(y,f.month-1,day);if(d<now)d=new Date(y+1,f.month-1,day);return{...f,date:d}});
  all.sort((a,b)=>a.date-b.date);return all[0]||{name:'—',emoji:'📅',date:new Date(),season:'Spring'}}
function getMonday(d){d=new Date(d);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);return d}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDateFull(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function weekKey(d){return d.toISOString().slice(0,10)}

function artBadge(art){if(!art)return'';const a=ARTS[art];return a?`<span class="badge badge-${a.cls}">${a.emoji} ${art}</span>`:art.split('·').map(x=>x.trim()).filter(Boolean).map(x=>{const a2=ARTS[x];return a2?`<span class="badge badge-${a2.cls}">${a2.emoji} ${x}</span>`:`<span class="badge">${x}</span>`}).join('')}
function langBadge(l){if(!l)return'';return `<span class="badge badge-lang">${l==='EN'?'🇺🇸':l==='TR'?'🇹🇷':l==='IT'?'🇮🇹':'🌐'} ${l}</span>`}
function seasonBadge(s){return s?`<span class="badge badge-season">${s}</span>`:''}
function festBadge(f){return f?`<span class="badge badge-festival">🎪 ${f}</span>`:''}

/* === TAB SWITCHING === */
function switchView(view){
  currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  $('view-'+view).classList.add('active');
  const viewMatch=view==='festivals'?'celebrat':view==='log'?'log':view;
  document.querySelectorAll('nav button').forEach(b=>{if(b.textContent.toLowerCase().includes(viewMatch))b.classList.add('active')});
  const renderers={dashboard:renderDashboard,planner:renderPlanner,catalog:renderCatalog,festivals:renderFestivals,log:renderLog,guide:renderGuide};
  if(renderers[view])renderers[view]();
}

/* === DASHBOARD === */
function renderDashboard(){
  const now=new Date(), dayIdx=now.getDay()===0?6:now.getDay()-1, virtue=VIRTUES[dayIdx], season=getCurrentSeason(), nextFest=getNextCelebration();
  const daysUntil=Math.ceil((nextFest.date-now)/(1000*60*60*24));
  const todayLogs=logEntries.filter(e=>e.date===now.toISOString().slice(0,10));
  const totalLogged=todayLogs.reduce((s,e)=>s+(e.duration||0),0);

  let html=`<div class="virtue-banner" style="background:${virtue.bg};color:${virtue.color}">
    <div class="emoji">${virtue.emoji}</div>
    <div class="info"><h2>${virtue.day} — ${virtue.virtue}</h2><p>${virtue.god}'s day · ${virtue.spirit}</p></div>
  </div>`;

  html+=`<div class="dash-grid">
    <div class="dash-card" style="background:${season.bg};color:${season.fg}"><div class="big">${season.emoji}</div><div class="label">Current Season</div><div class="sub">${season.name} — ${season.theme}</div></div>
    <div class="dash-card" style="background:${nextFest.season==='Spring'?'#C8EDD8':nextFest.season==='Summer'?'#FFF5C0':nextFest.season==='Autumn'?'#FDEBD0':'#D6E4F0'}"><div class="big">${nextFest.emoji}</div><div class="label">Next Celebration</div><div class="sub">${nextFest.name} — ${daysUntil} days</div></div>
    <div class="dash-card" style="background:#F0F4FF"><div class="big">${todayLogs.length}</div><div class="label">Logged Today</div><div class="sub">${totalLogged} min</div></div>
  </div>`;

  html+=h('h3','section-title','Today\'s Suggested Activities');
  const suggested=ACTIVITIES.filter(a=>{
    const matchVirtue=a.virtue===virtue.virtue;
    const matchArt=a.art===virtue.priArt||a.art===virtue.secArt||a.arts2===virtue.priArt||a.arts2===virtue.secArt;
    return matchVirtue||matchArt;
  }).slice(0,8);
  html+=`<div class="cards cards-3">${suggested.map(a=>`<div class="card act-card" onclick="openModal(${a.id})">
    <div class="name">${a.name}</div>
    <div>${artBadge(a.art)}${a.arts2?artBadge(a.arts2):''}${langBadge(a.lang)}</div>
    <div class="desc">${a.desc}</div>
    <div class="meta">${a.min}–${a.max} min · ${a.age}</div>
  </div>`).join('')}</div>`;

  html+=h('h3','section-title','Weekly Arts Balance');
  const wk=weekKey(plannerWeekStart);
  const weekLogs=logEntries.filter(e=>{const d=new Date(e.date);return d>=plannerWeekStart&&d<addDays(plannerWeekStart,7)});
  const artCounts={};Object.keys(ARTS).forEach(a=>artCounts[a]=0);
  weekLogs.forEach(e=>{const act=ACTIVITIES.find(a=>a.id===e.activityId);if(act){artCounts[act.art]=(artCounts[act.art]||0)+1;if(act.arts2)artCounts[act.arts2]=(artCounts[act.arts2]||0)+1}});
  html+=`<div style="display:flex;gap:12px;flex-wrap:wrap">${Object.entries(ARTS).map(([name,a])=>`<div style="background:${a.bg};color:${a.fg};padding:12px 16px;border-radius:8px;text-align:center;min-width:120px">
    <div style="font-size:24px">${a.emoji}</div><div style="font-size:12px;font-weight:600">${name}</div><div style="font-size:20px;font-weight:700">${artCounts[name]||0}</div>
  </div>`).join('')}</div>`;

  $('view-dashboard').innerHTML=html;
}

function setCatTab(art){catalogFilters.art=art;renderCatalog()}
function clearCatFilters(){catalogFilters={search:'',art:'',virtue:'',season:'',lang:'',festival:''};renderCatalog()}
function toggleCatSort(col){if(catalogSort.col===col)catalogSort.asc=!catalogSort.asc;else{catalogSort.col=col;catalogSort.asc=true}renderCatalogBody()}

function renderCatalogBody(){
  let filtered=ACTIVITIES.filter(a=>{
    if(catalogFilters.art==='__custom__') return a.custom;
    if(catalogFilters.search&&!a.name.toLowerCase().includes(catalogFilters.search)&&!String(a.desc||'').toLowerCase().includes(catalogFilters.search))return false;
    if(catalogFilters.art&&a.art!==catalogFilters.art&&a.arts2!==catalogFilters.art)return false;
    if(catalogFilters.virtue&&a.virtue!==catalogFilters.virtue)return false;
    if(catalogFilters.lang&&a.lang!==catalogFilters.lang)return false;
    if(catalogFilters.season){const s=a.seasons;if(s&&s!=='All'&&!s.includes(catalogFilters.season))return false}
    return true;
  });

  /* Sort for table */
  if(catalogView==='table'){
    const col=catalogSort.col,asc=catalogSort.asc;
    filtered.sort((a,b)=>{let av=a[col]||'',bv=b[col]||'';
      return typeof av==='number'?(asc?av-bv:bv-av):(asc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av)));
    });
  }

  const container=$('catalog-output');
  if(!filtered.length){container.innerHTML=`<div class="empty-state">No activities match — try clearing filters</div>`;return}

  const countLine=`<div style="font-size:13px;color:var(--muted);margin-bottom:10px">${filtered.length} of ${ACTIVITIES.length} activities</div>`;

  if(catalogView==='grid'){
    container.innerHTML=countLine+`<div class="cards cards-3">${filtered.map(a=>`
      <div class="card act-card" style="position:relative">
        <div class="name" onclick="openModal(${a.id})" style="cursor:pointer">${a.name}${a.custom?'<span class="badge badge-custom" style="margin-left:6px">custom</span>':''}</div>
        <div style="margin:6px 0">${artBadge(a.art)}${a.arts2?artBadge(a.arts2):''}${langBadge(a.lang)}${a.festival?festBadge(a.festival):''}</div>
        <div class="desc">${a.desc||''}</div>
        <div class="meta" style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
          <span>${a.min}–${a.max} min · ${a.age||''}</span>
          <span style="display:flex;gap:4px">
            <button class="act-edit-btn" onclick="event.stopPropagation();openActivityForm(${a.id})">✏️ Edit</button>
            ${a.custom?`<button class="act-del-btn" onclick="event.stopPropagation();deleteCustomActivity(${a.id})">🗑</button>`:''}
          </span>
        </div>
      </div>`).join('')}</div>`;
  } else {
    /* Table view */
    const th=(col,label,w)=>`<th onclick="toggleCatSort('${col}')" style="${w?'width:'+w:''}">${label}${catalogSort.col===col?(catalogSort.asc?' ↑':' ↓'):'<span style="opacity:.3"> ↕</span>'}</th>`;
    container.innerHTML=countLine+`<div style="overflow-x:auto"><table class="cat-table">
      <thead><tr>
        ${th('name','Activity Name')}
        ${th('art','Art','150px')}
        ${th('virtue','Virtue','110px')}
        ${th('lang','Lang','70px')}
        ${th('min','Min','55px')}
        ${th('max','Max','55px')}
        ${th('seasons','Season','90px')}
        ${th('disc','TX Disciplines')}
        <th style="width:80px">Actions</th>
      </tr></thead>
      <tbody>${filtered.map(a=>{
        const v=VIRTUES.find(x=>x.virtue===a.virtue);
        return `<tr>
          <td><span class="act-name-link" onclick="openModal(${a.id})">${a.name}</span>${a.custom?'<span class="badge badge-custom" style="margin-left:6px">custom</span>':''}</td>
          <td>${artBadge(a.art)}${a.arts2?'<br>'+artBadge(a.arts2):''}</td>
          <td style="font-size:12px;white-space:nowrap">${v?v.emoji+' ':''}<span style="color:${v?v.color:'inherit'}">${a.virtue||''}</span></td>
          <td>${langBadge(a.lang)}</td>
          <td style="text-align:center;color:var(--muted)">${a.min}</td>
          <td style="text-align:center;color:var(--muted)">${a.max}</td>
          <td style="font-size:12px">${a.seasons&&a.seasons!=='All'?a.seasons:'<span style="color:var(--muted)">All</span>'}</td>
          <td style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.disc||''}">${a.disc||'—'}</td>
          <td style="white-space:nowrap">
            <button class="act-edit-btn" onclick="openActivityForm(${a.id})" title="Edit">✏️</button>
            ${a.custom?`<button class="act-del-btn" onclick="deleteCustomActivity(${a.id})" title="Delete">🗑</button>`:''}
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

function renderPlanner(){
  const wkStart=plannerWeekStart;
  let html=`<div class="week-nav">
    <button onclick="plannerWeekStart=addDays(plannerWeekStart,-7);renderPlanner()">◀ Prev</button>
    <span class="week-label">${fmtDate(wkStart)} – ${fmtDate(addDays(wkStart,6))}</span>
    <button onclick="plannerWeekStart=addDays(plannerWeekStart,7);renderPlanner()">Next ▶</button>
    <button onclick="plannerWeekStart=getMonday(new Date());renderPlanner()">Today</button>
    <button onclick="openBlockEditor()" style="font-size:12px;margin-left:auto">✏️ Edit Schedule</button>
  </div>`;

  html+=`<div class="planner-grid">`;
  html+=`<div class="planner-hdr">Time</div><div class="planner-hdr">Block</div>`;
  for(let d=0;d<7;d++){
    const date=addDays(wkStart,d);
    const v=VIRTUES[d];
    const hdrTextColor=v.bg==='#ffffff'?'#374151':v.color;
    html+=`<div class="planner-hdr" style="background:${v.bg}!important;color:${hdrTextColor}!important"><div>${v.emoji} ${v.day.slice(0,3)}</div><div style="font-size:10px;opacity:.85">${fmtDate(date)}</div><div style="font-size:9px;font-weight:700;letter-spacing:.4px">${v.virtue}</div></div>`;
  }

  timeBlocks.forEach((tb,bi)=>{
    html+=`<div class="planner-time">${tb[0]}</div>`;
    html+=`<div class="planner-label"><div style="font-weight:600">${tb[1]}</div><div style="font-size:10px;opacity:.6">${tb[2]}</div></div>`;
    for(let d=0;d<7;d++){
      const key=`${weekKey(wkStart)}_${d}_${bi}`;
      const actId=plannerData[key];
      const act=actId?ACTIVITIES.find(a=>a.id===actId):null;
      const bg=act?ARTS[act.art]?.bg||'#f5f5f5':'';
      html+=`<div class="planner-cell${act?' has-activity':''}" style="background:${bg||''}" onclick="openPick(${d},${bi})" title="${act?act.name:'Click to assign'}">
        ${act?`<span>${act.name}</span>`:''}
      </div>`;
    }
  });
  html+=`</div>`;
  $('view-planner').innerHTML=html;
}

function removeBlockRow(i){

  tbody.children[i].remove();
}

function saveBlockEditor(){
  const tbody=$('tbe-table').querySelector('tbody');
  const newBlocks=[];
  for(let i=0;i<tbody.children.length;i++){
    const inputs=tbody.children[i].querySelectorAll('input');
    const t=inputs[0].value.trim(),n=inputs[1].value.trim(),r=inputs[2].value.trim();
    if(t||n)newBlocks.push([t,n,r]);
  }
  if(!newBlocks.length){alert('Need at least one time block.');return}
  timeBlocks=newBlocks;
  save('timeBlocks',timeBlocks);
  closeModal();renderPlanner();
}

function resetTimeBlocks(){

  timeBlocks=DEFAULT_TIME_BLOCKS.map(tb=>[tb[0],tb[1],tb[2]]);

  renderPlanner();
}

/* === PICK OVERLAY (for planner) === */
function openPick(day,block){
  pickTarget={day,block};
  const key=`${weekKey(plannerWeekStart)}_${day}_${block}`;
  const v=VIRTUES[day];
  let items=ACTIVITIES.slice().sort((a,b)=>{
    const aMatch=(a.art===v.priArt||a.art===v.secArt)?1:0;
    const bMatch=(b.art===v.priArt||b.art===v.secArt)?1:0;
    return bMatch-aMatch;
  });
  const pm=$('pick-content');
  pm.innerHTML=`<input type="text" placeholder="Search activities..." id="pick-search" oninput="filterPick()">
    <div id="pick-list">${renderPickList(items)}</div>
    <div style="padding:8px;text-align:center"><button onclick="clearPick()" style="padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px">Clear slot</button></div>`;
  $('pick-overlay').classList.add('open');
  $('pick-search').focus();
}
function renderPickList(items){
  return items.map(a=>`<div class="pick-item" onclick="assignPick(${a.id})">
    <span>${a.name}</span><span class="pick-art">${ARTS[a.art]?.emoji||''} ${a.art}</span>
  </div>`).join('');
}
function filterPick(){
  const q=$('pick-search').value.toLowerCase();
  const items=ACTIVITIES.filter(a=>a.name.toLowerCase().includes(q)||String(a.desc||'').toLowerCase().includes(q));
  $('pick-list').innerHTML=renderPickList(items);
}
function assignPick(actId){
  if(!pickTarget)return;
  const key=`${weekKey(plannerWeekStart)}_${pickTarget.day}_${pickTarget.block}`;
  plannerData[key]=actId;
  save('planner',plannerData);
  closePick();renderPlanner();
}
function clearPick(){
  if(!pickTarget)return;
  const key=`${weekKey(plannerWeekStart)}_${pickTarget.day}_${pickTarget.block}`;
  delete plannerData[key];
  save('planner',plannerData);
  closePick();renderPlanner();
}
function closePick(){$('pick-overlay').classList.remove('open');pickTarget=null}

function saveCelebration(editName){
  const name=$('cf-name').value.trim();
  if(!name){alert('Please enter a name.');return}
  const c={
    name,emoji:$('cf-emoji').value||'🎂',
    month:parseInt($('cf-month').value)||1,day:parseInt($('cf-day').value)||1,
    season:$('cf-season').value,window:$('cf-window').value.trim(),
    theme:$('cf-theme').value.trim(),virtue:$('cf-virtue').value,
    arts:$('cf-arts').value.trim(),note:$('cf-note').value.trim(),
    acts:$('cf-acts').value.trim(),custom:true
  };
  if(editName){
    const idx=FESTIVALS.findIndex(f=>f.name===editName);
    if(idx!==-1)FESTIVALS[idx]=c;
    const cidx=customCelebrations.findIndex(f=>f.name===editName);
    if(cidx!==-1)customCelebrations[cidx]=c;else customCelebrations.push(c);
  } else {
    FESTIVALS.push(c);customCelebrations.push(c);
  }
  save('customCeleb',customCelebrations);
  closeModal();renderFestivals();
}

function deleteCelebration(name,isCustom){
  if(!confirm('Remove "'+name+'" from your calendar?'))return;
  const idx=FESTIVALS.findIndex(f=>f.name===name);if(idx!==-1)FESTIVALS.splice(idx,1);
  if(isCustom){
    const cidx=customCelebrations.findIndex(f=>f.name===name);if(cidx!==-1)customCelebrations.splice(cidx,1);
    save('customCeleb',customCelebrations);
  } else {
    if(!deletedFests.includes(name))deletedFests.push(name);
    save('deletedFests',deletedFests);
  }
  renderFestivals();
}

  if(!confirm('Restore all deleted built-in celebrations?'))return;

/* === LOG === */
function renderLog(){
  let html=`<h2 class="section-title">Activity Log</h2>`;
  html+=`<div class="log-form">
    <label>Date<input type="date" id="log-date" value="${new Date().toISOString().slice(0,10)}"></label>
    <label>Activity<select id="log-activity">${ACTIVITIES.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></label>
    <label>Duration (min)<input type="number" id="log-duration" value="20" min="1"></label>
    <label>Notes<input type="text" id="log-notes" placeholder="Optional notes..."></label>
    <button onclick="submitLog()">📝 Log Activity</button>
  </div>`;

  // Recent entries
  const recent=logEntries.slice(-30).reverse();
  if(recent.length){
    html+=`<table class="log-table"><thead><tr><th>Date</th><th>Activity</th><th>Art</th><th>Duration</th><th>Notes</th><th></th></tr></thead><tbody>`;
    recent.forEach((e,i)=>{
      const act=ACTIVITIES.find(a=>a.id===e.activityId);
      html+=`<tr><td>${e.date}</td><td>${act?act.name:'?'}</td><td>${act?artBadge(act.art):''}</td><td>${e.duration} min</td><td>${e.notes||''}</td><td><button onclick="deleteLog(${logEntries.length-1-i})" style="border:none;background:none;cursor:pointer;color:var(--muted)">✕</button></td></tr>`;
    });
    html+=`</tbody></table>`;
  }

  // Texas discipline summary
  html+=`<div class="tx-summary"><h3 class="section-title">Texas Homeschool Summary</h3>`;
  html+=`<div class="tx-row hdr"><div>Discipline</div><div>Primary Art</div><div>Sessions Logged</div></div>`;
  TX_DISCIPLINES.forEach(([disc,art,note])=>{
    let count=0;
    if(disc==='Turkish Language Arts'){count=logEntries.filter(e=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return a&&a.lang==='TR'}).length}
    else if(disc==='Italian Language Arts'){count=logEntries.filter(e=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return a&&a.lang==='IT'}).length}
    else if(disc==='Early Childhood Development'){count=logEntries.length}
    else{count=logEntries.filter(e=>{const a=ACTIVITIES.find(x=>x.id===e.activityId);return a&&(a.disc||'').toLowerCase().includes(disc.toLowerCase().split(' ')[0])}).length}
    html+=`<div class="tx-row" style="background:${count>0?'#F0FFF0':'#FFF5F5'}"><div>${disc}</div><div>${art}</div><div>${count}</div></div>`;
  });
  html+=`</div>`;
  $('view-log').innerHTML=html;
}

function submitLog(){
  const entry={
    date:$('log-date').value,
    activityId:parseInt($('log-activity').value),
    duration:parseInt($('log-duration').value),
    notes:$('log-notes').value,
    timestamp:Date.now()
  };
  logEntries.push(entry);
  save('log',logEntries);
  renderLog();
}
function quickLog(actId){
  switchView('log');
  setTimeout(()=>{$('log-activity').value=actId},100);
}
function deleteLog(idx){
  if(idx>=0&&idx<logEntries.length){logEntries.splice(idx,1);save('log',logEntries);renderLog()}
}

    ${isEdit&&!e.custom?'<p style="font-size:12px;color:#5B21B6;margin-bottom:8px">Editing a built-in activity — your changes will be saved and persist across sessions.</p>':''}
    <div class="act-form">
      <label class="full">Activity Name *<input id="af-name" value="${(e.name||'').replace(/"/g,'&quot;')}" placeholder="e.g. Morning Sensory Walk"></label>
      <label>Primary Art *<select id="af-art">${artOpts}</select></label>
      <label>Secondary Art<select id="af-arts2">${arts2Opts}</select></label>
      <label>Day Virtue *<select id="af-virtue">${virtueOpts}</select></label>
      <label>Language<select id="af-lang">${langOpts}</select></label>
      <label>Min Duration (min)<input type="number" id="af-min" value="${e.min||15}" min="1"></label>
      <label>Max Duration (min)<input type="number" id="af-max" value="${e.max||45}" min="1"></label>
      <label>Setup (min)<input type="number" id="af-setup" value="${e.setup||5}" min="0"></label>
      <label>Cleanup (min)<input type="number" id="af-cleanup" value="${e.cleanup||0}" min="0"></label>
      <label>Age Range<input id="af-age" value="${e.age||'18m+'}" placeholder="18m+"></label>

      <label>Seasons<select id="af-seasons">${seasonOpts}</select></label>
      <label>Festival<select id="af-festival">${festOpts}</select></label>
      <label class="full">Description *<textarea id="af-desc" placeholder="What is this activity? What does the child experience?">${e.desc||''}</textarea></label>
      <label class="full">TX Disciplines<input id="af-disc" value="${e.disc||''}" placeholder="e.g. Visual Arts · Motor Dev · SEL"></label>
      <label class="full">Required Materials<input id="af-matmin" value="${(e.matMin||'').replace(/"/g,'&quot;')}" placeholder="e.g. Paper · watercolour paints · brush"></label>
      <label class="full">Optional Materials<input id="af-matopt" value="${(e.matOpt||'').replace(/"/g,'&quot;')}" placeholder="e.g. Apron · table cover"></label>
      <div class="form-btns">
        <button onclick="closeModal()" style="padding:8px 20px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-family:inherit">Cancel</button>
        <button onclick="saveActivityForm(${isEdit?id:'null'})" style="padding:8px 24px;background:#5B21B6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit">${isEdit?'Save Changes':'Add to Catalog'}</button>
      </div>
    </div>`;
  $('modal-overlay').classList.add('open');
  $('modal-overlay').style.alignItems='flex-start';
  $('modal-overlay').style.paddingTop='24px';
}

function saveActivityForm(id){
  const name=$('af-name').value.trim();
  if(!name){alert('Please enter an activity name.');return}
  const act={
    id:id!=null?id:nextCustomId++,
    name,
    art:$('af-art').value,
    arts2:$('af-arts2').value,
    virtue:$('af-virtue').value,
    lang:$('af-lang').value,
    min:parseInt($('af-min').value)||15,
    max:parseInt($('af-max').value)||45,
    setup:parseInt($('af-setup').value)||5,
    cleanup:parseInt($('af-cleanup').value)||0,
    age:$('af-age').value||'18m+',
    seasons:$('af-seasons').value||'All',
    festival:$('af-festival').value||'',
    target:parseInt($('af-target').value)||1,
    desc:$('af-desc').value.trim(),
    disc:$('af-disc').value.trim(),
    matMin:$('af-matmin').value.trim(),
    matOpt:$('af-matopt').value.trim(),
    custom:true
  };
  /* Update ACTIVITIES array */
  const idx=ACTIVITIES.findIndex(a=>a.id===act.id);
  if(idx!==-1)ACTIVITIES[idx]=act;else ACTIVITIES.push(act);
  /* Update customActivities (persisted) */
  const cidx=customActivities.findIndex(a=>a.id===act.id);
  if(cidx!==-1)customActivities[cidx]=act;else customActivities.push(act);
  save('customActs',customActivities);
  closeModal();
  renderCatalog();
}

function deleteCustomActivity(id){
  if(!confirm('Delete this activity from the catalog?'))return;
  const idx=ACTIVITIES.findIndex(a=>a.id===id);if(idx!==-1)ACTIVITIES.splice(idx,1);
  const cidx=customActivities.findIndex(a=>a.id===id);if(cidx!==-1)customActivities.splice(cidx,1);
  save('customActs',customActivities);
  if(currentView==='catalog')renderCatalog();
}

/* === GUIDE / REFERENCE TABS === */
function renderGuide(){
  let html=`<div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px" id="guide-tabs">
    <button class="cat-tab active" id="gtab-virtues" onclick="showGuideTab('virtues')">🌙 Days & Virtues</button>
    <button class="cat-tab" id="gtab-pillars" onclick="showGuideTab('pillars')">🏛️ Pillars Guide</button>
  </div>
  <div id="guide-content"></div>`;
  $('view-guide').innerHTML=html;
  showGuideTab('virtues');
}

function showGuideTab(tab){
  document.querySelectorAll('#guide-tabs .cat-tab').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('gtab-'+tab);if(btn)btn.classList.add('active');
  const c=$('guide-content');
  if(tab==='virtues') c.innerHTML=renderVirtuesGuide();
  else c.innerHTML=renderPillarsGuide();
}

      <div style="font-size:12px;margin-bottom:6px"><strong>Primary Art:</strong> ${artBadge(v.priArt)} <strong style="margin-left:6px">Secondary:</strong> ${artBadge(v.secArt)}</div>
      <div style="font-size:12px;margin-bottom:6px"><strong>Waldorf element:</strong> <span style="color:var(--muted)">${v.waldorf}</span></div>

  });

  html+=`<h3 class="section-title" style="margin-top:32px">At a Glance — Full Week</h3>`;
  html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">

      <th style="background:var(--primary);color:#fff;padding:10px 12px">Spirit</th>
      <th style="background:var(--primary);color:#fff;padding:10px 12px">Primary Art</th>
      <th style="background:var(--primary);color:#fff;padding:10px 12px">Sub-values</th>
    </tr></thead>
    <tbody>${VIRTUES.map(v=>`<tr style="background:${v.bg}40">
      <td style="padding:10px 12px;font-weight:700;border-bottom:1px solid var(--border)"><span style="color:${v.color}">${v.emoji} ${v.day}</span></td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:center">${v.god}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);font-weight:600;color:${v.color}">${v.virtue}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);font-style:italic;color:var(--muted);font-size:12px">${v.spirit}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border)">${artBadge(v.priArt)}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)">${v.subs}</td>
